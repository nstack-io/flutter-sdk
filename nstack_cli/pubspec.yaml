name: nstack_cli
description: NStack Flutter command-line application.
version: 0.0.1
author: Monstarlab
homepage: https://github.com/nstack-io/flutter-sdk

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  path: ^1.8.0
  yaml: ^3.1.0
  args: ^2.0.0
  http: ^0.13.1
  nstack_api:
    path: ../nstack_api

dev_dependencies:
  pedantic: ^1.11.0
  test: ^1.16.8

executables:
  nstack_cli: